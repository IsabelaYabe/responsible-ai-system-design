<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anti-spoiler reading companion — demo</title>
<style>
  :root {
    --bg:#faf8f3; --panel:#fff; --line:#e2ddd2; --ink:#2b2b2b; --muted:#777; --accent:#5b7c99;
    /* validation palette — mirrors the design record */
    --valid:#1F7A52; --valid-bg:#E6F2EC; --valid-line:#BCDFCD;
    --hedge:#9C6B12; --hedge-bg:#FBF0DA; --hedge-line:#EAD3A6;
    --bad:#B23A2F;   --bad-bg:#F8E6E3;   --bad-line:#EBC6C0;
    --unv:#46505F;   --unv-bg:#EEF1F5;   --unv-line:#CED5DF;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: Georgia, "Times New Roman", serif; color:var(--ink); background:var(--bg); }
  .layout { display:flex; height:100vh; }
  /* Reading pane */
  #reader { flex:1; overflow-y:auto; padding:40px 56px; }
  #reader h1 { font-size:22px; margin:0 0 4px; }
  #reader .byline { color:var(--muted); font-style:italic; margin-bottom:24px; }
  #book h2 { font-size:16px; letter-spacing:.04em; text-transform:uppercase; color:var(--accent); margin:32px 0 10px; }
  #book p { line-height:1.7; margin:0 0 14px; max-width:62ch; }
  #book ::selection { background:#f6e9a0; }
  /* Sidebar */
  #panel { width:400px; min-width:400px; border-left:1px solid var(--line); background:var(--panel);
           display:flex; flex-direction:column; padding:24px; overflow-y:auto; font-family: system-ui, sans-serif; }
  #panel h2 { font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 8px; }
  .pos { margin-bottom:20px; }
  .pos input[type=range] { width:100%; }
  .pos .val { font-weight:600; }
  .selbox { border:1px solid var(--line); border-radius:8px; background:#fbfaf7; padding:10px 12px;
            min-height:64px; font-size:14px; line-height:1.5; color:var(--ink); margin-bottom:14px; white-space:pre-wrap; }
  .selbox.empty { color:var(--muted); font-style:italic; }
  .acts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px; }
  .acts button { padding:10px; border:1px solid var(--accent); background:#fff; color:var(--accent);
                 border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; }
  .acts button:hover:not(:disabled) { background:var(--accent); color:#fff; }
  .acts button:disabled { opacity:.45; cursor:not-allowed; }
  .answer { border-top:1px solid var(--line); padding-top:14px; font-size:14.5px; line-height:1.6; }
  .answer .tag { display:inline-block; font-size:11px; text-transform:uppercase; letter-spacing:.05em;
                 background:#eef2f5; color:var(--accent); padding:2px 8px; border-radius:10px; margin-bottom:8px; }
  /* Rendered markdown from the model — keep headings modest in the narrow panel. */
  .answer .md > :first-child { margin-top:0; }
  .answer .md h1, .answer .md h2, .answer .md h3 { font-size:14.5px; font-weight:700; margin:14px 0 4px; }
  .answer .md p { margin:0 0 10px; }
  .answer .md ul, .answer .md ol { margin:0 0 10px; padding-left:20px; }
  .answer .md li { margin:2px 0; }
  .answer .md code { background:#eef2f5; padding:1px 4px; border-radius:4px; font-size:13px; }
  .answer .md strong { font-weight:700; }
  .muted { color:var(--muted); }

  /* ── Spinner (shown during the blocking generate+validate call) ── */
  .thinking { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:14px; }
  .spinner { width:16px; height:16px; border:2px solid #d9d2c4; border-top-color:var(--accent);
             border-radius:50%; animation:spin .8s linear infinite; flex:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @media (prefers-reduced-motion:reduce) { .spinner { animation:none; } }

  /* ── Validation block ── */
  /* Divider sets the validator result apart from the answer above it. */
  .validation { margin-top:18px; padding-top:16px; border-top:2px solid var(--line); }
  .vbanner { display:flex; flex-direction:column; gap:7px; padding:10px 12px; border-radius:9px; border:1px solid; }
  .voverline { font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; opacity:.72; }
  .vbanner-head { display:flex; align-items:center; gap:9px; font-size:13px; font-weight:700; letter-spacing:.02em; }
  .vbanner .vdot { width:9px; height:9px; border-radius:50%; flex:none; }
  .vbanner .vmeta { position:relative; margin-left:auto; font-weight:500; font-size:11.5px; opacity:.85;
                    letter-spacing:0; cursor:help; border-bottom:1px dotted currentColor; }
  /* Custom tooltip — native title is too slow; this shows almost instantly. */
  .vtip { position:absolute; top:calc(100% + 8px); right:0; z-index:30; width:264px; max-width:78vw;
          background:var(--ink); color:#fff; font-weight:400; font-size:11.5px; line-height:1.5;
          letter-spacing:0; text-transform:none; padding:9px 11px; border-radius:8px;
          box-shadow:0 6px 22px rgba(25,33,46,.22); opacity:0; visibility:hidden; transform:translateY(-3px);
          transition:opacity .1s ease, transform .1s ease, visibility .1s; transition-delay:.05s;
          pointer-events:none; white-space:normal; }
  .vtip::before { content:""; position:absolute; bottom:100%; right:14px; border:6px solid transparent;
                  border-bottom-color:var(--ink); }
  .vmeta:hover .vtip, .vmeta:focus .vtip, .vmeta:focus-visible .vtip {
          opacity:1; visibility:visible; transform:translateY(0); transition-delay:0s; }
  @media (prefers-reduced-motion:reduce) { .vtip { transition:none; transform:none; } }
  .vbanner.v-valid { background:var(--valid-bg); border-color:var(--valid-line); color:var(--valid); }
  .vbanner.v-valid .vdot { background:var(--valid); }
  .vbanner.v-hedge { background:var(--hedge-bg); border-color:var(--hedge-line); color:var(--hedge); }
  .vbanner.v-hedge .vdot { background:var(--hedge); }
  .vbanner.v-bad   { background:var(--bad-bg);   border-color:var(--bad-line);   color:var(--bad); }
  .vbanner.v-bad   .vdot { background:var(--bad); }
  /* Message sits inside the coloured box, under the state label. */
  .vmessage { font-size:12.5px; color:var(--ink); opacity:.9; }

  .vretry { margin-top:10px; padding:7px 12px; border:1px dashed var(--bad-line); background:#fff;
            color:var(--bad); border-radius:8px; font-size:12.5px; font-weight:600;
            opacity:.7; cursor:not-allowed; }
  .vretry small { display:block; font-weight:400; opacity:.8; }

  .vnote { margin-top:12px; padding:9px 12px; border:1px solid var(--line); border-left:3px solid var(--muted);
           background:#fbfaf7; border-radius:8px; font-size:12.5px; color:var(--muted); }

  /* validation path (§7) */
  .vpath { margin-top:12px; font-size:13px; }
  .vpath > summary { cursor:pointer; font-weight:600; color:var(--accent); font-size:12.5px;
                     list-style:none; padding:4px 0; }
  .vpath > summary::-webkit-details-marker { display:none; }
  .vpath > summary::before { content:"▸ "; }
  .vpath[open] > summary::before { content:"▾ "; }
  .vclaims { list-style:none; margin:8px 0 0; padding:0; }
  .vclaim { border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin:0 0 7px; background:#fff; }
  .vclaim .chead { display:flex; align-items:center; gap:8px; }
  .vchip { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em;
           padding:2px 7px; border-radius:6px; border:1px solid; white-space:nowrap; }
  .vchip.c-sup { background:var(--valid-bg); border-color:var(--valid-line); color:var(--valid); }
  .vchip.c-par { background:var(--hedge-bg); border-color:var(--hedge-line); color:var(--hedge); }
  .vchip.c-con { background:var(--bad-bg);   border-color:var(--bad-line);   color:var(--bad); }
  .vchip.c-unv { background:var(--unv-bg);   border-color:var(--unv-line);   color:var(--unv); }
  .vclaim .cconf { margin-left:auto; font-size:11px; color:var(--muted); }
  .vclaim .cground { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .vclaim .ctext { margin:5px 0 0; font-size:13px; color:var(--ink); }
  .vclaim .creason { margin:4px 0 0; font-size:12px; color:var(--muted); font-style:italic; }

  .vsources { margin-top:6px; }
  .vsources > summary { cursor:pointer; font-size:12px; color:var(--accent); padding:3px 0; }
  .vsource { border:1px solid var(--line); border-radius:7px; padding:7px 9px; margin:6px 0 0; background:#fbfaf7; }
  .vsource .sid { font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; margin-bottom:3px; }
  .vsource .stext { font-size:12px; color:var(--ink); line-height:1.5; }
</style>
</head>
<body>
<div class="layout">
  <main id="reader">
    <h1 id="title">…</h1>
    <div class="byline" id="byline"></div>
    <div id="book"><p class="muted">Loading…</p></div>
  </main>

  <aside id="panel">
    <div class="pos">
      <h2>Reading position</h2>
      <div>Through chapter <span class="val" id="posVal">–</span> <span class="muted" id="posMax"></span></div>
      <input type="range" id="pos" min="1" max="1" value="1" />
      <div class="muted" style="font-size:12px;margin-top:4px;">You can only select text up to here.</div>
    </div>

    <h2>Selected text</h2>
    <div class="selbox empty" id="sel">Highlight a word or passage in the text…</div>

    <h2>What would you like?</h2>
    <div class="acts">
      <button data-intent="define" disabled>Define</button>
      <button data-intent="paraphrase" disabled>Paraphrase</button>
      <button data-intent="contextualize" disabled>Contextualize</button>
      <button data-intent="recall" disabled>Recall</button>
    </div>

    <div class="answer" id="answer"><span class="muted">The assistant's reply will appear here.</span></div>
  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const $ = (id) => document.getElementById(id);
let selectedText = "";
let spinnerTimer = null;

// Verdict label -> css modifier for the per-claim chips.
const VCHIP = {
  "Supported": "c-sup",
  "Partially supported": "c-par",
  "Contradicted": "c-con",
  "Unverifiable": "c-unv",
};
// UI state -> banner modifier.
const VBANNER = { "Valid": "v-valid", "Hedged": "v-hedge", "Not reliable": "v-bad" };

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
const fmtConf = (c) => (c === null || c === undefined) ? "n/a" : Number(c).toFixed(2);

async function loadConfig() {
  const c = await (await fetch("/config")).json();
  $("title").textContent = c.title;
  $("byline").textContent = "by " + c.author;
  const pos = $("pos");
  pos.max = c.max_chapter;
  pos.value = c.default_position;
  $("posMax").textContent = "of " + c.max_chapter;
  return c;
}

async function loadBook() {
  const upto = $("pos").value;
  $("posVal").textContent = upto;
  const data = await (await fetch("/book?upto=" + upto)).json();
  const book = $("book");
  book.innerHTML = "";
  for (const ch of data.chapters) {
    const h = document.createElement("h2");
    h.textContent = ch.label;
    book.appendChild(h);
    for (const para of ch.paragraphs) {
      const p = document.createElement("p");
      p.textContent = para;
      book.appendChild(p);
    }
  }
}

function setSelection(text) {
  selectedText = text.trim();
  const sel = $("sel");
  const has = selectedText.length > 0;
  sel.textContent = has ? selectedText : "Highlight a word or passage in the text…";
  sel.classList.toggle("empty", !has);
  document.querySelectorAll(".acts button").forEach((b) => (b.disabled = !has));
}

// ── spinner: a small rotating message so the blocking generate+validate call
//    feels alive (validation adds real latency: 1 decompose + N per-claim judge calls).
function startSpinner() {
  const msgs = [
    "Reading the passages you've read…",
    "Drafting an answer…",
    "Breaking it into checkable claims…",
    "Checking each claim against the text…",
  ];
  let i = 0;
  const answer = $("answer");
  const paint = () =>
    (answer.innerHTML = '<div class="thinking"><span class="spinner"></span><span>' + esc(msgs[i]) + "</span></div>");
  paint();
  // Advance through the messages once, then hold on the last one (don't loop).
  spinnerTimer = setInterval(() => {
    if (i < msgs.length - 1) { i++; paint(); }
    else { clearInterval(spinnerTimer); spinnerTimer = null; }
  }, 1600);
}
function stopSpinner() {
  if (spinnerTimer) { clearInterval(spinnerTimer); spinnerTimer = null; }
}

// ── render the §7 validation path: evidence -> claims -> per-claim comparison -> verdict
function renderValidation(v) {
  if (!v) return "";
  if (!v.enabled) {
    return '<div class="vnote">' + esc(v.note || "Validation not available for this response.") + "</div>";
  }
  const cls = VBANNER[v.ui_state] || "v-hedge";
  const meta = `${v.n_claims} claim${v.n_claims === 1 ? "" : "s"} · conf ${fmtConf(v.answer_confidence)} · τ ${v.conf_threshold}`;
  const metaTip =
    `Claims checked: ${v.n_claims}.  ` +
    `conf ${fmtConf(v.answer_confidence)} = the validator's confidence (0–1) in the claim that drove this verdict.  ` +
    `τ ${v.conf_threshold} = the commit threshold: below it the answer is hedged instead of marked Valid or Not reliable.`;

  let html = '<div class="validation">';
  html += `<div class="vbanner ${cls}">`;
  html += '<div class="voverline">Answer validator</div>';
  html += `<div class="vbanner-head"><span class="vdot"></span><span>${esc(v.banner)}</span>`;
  html += `<span class="vmeta" tabindex="0">${esc(meta)}<span class="vtip" role="tooltip">${esc(metaTip)}</span></span></div>`;
  html += `<div class="vmessage">${esc(v.message)}</div>`;
  html += "</div>";

  // Not reliable -> retry path is intentionally not built yet (kept visible as in-progress).
  if (v.ui_state === "Not reliable") {
    html += '<button class="vretry" disabled>Try again <small>retry — in progress, not yet enabled</small></button>';
  }

  // The auditable validation path (§7) — collapsed by default; the reader expands to audit.
  html += `<details class="vpath"><summary>How this was checked</summary>`;
  html += '<ol class="vclaims">';
  for (const c of (v.claims || [])) {
    const chip = VCHIP[c.verdict] || "c-unv";
    html += '<li class="vclaim">';
    html += '<div class="chead">';
    html += `<span class="vchip ${chip}">${esc(c.verdict)}</span>`;
    html += `<span class="cground">${esc(c.grounding)}</span>`;
    html += `<span class="cconf">conf ${fmtConf(c.confidence)}</span>`;
    html += "</div>";
    html += `<div class="ctext">${esc(c.claim)}</div>`;
    if (c.reason) html += `<div class="creason">${esc(c.reason)}</div>`;
    html += "</li>";
  }
  html += "</ol>";

  // Evidence selected — the retrieved, position-bounded passages the judge grounded on.
  const ev = v.evidence || [];
  if (ev.length) {
    html += `<details class="vsources"><summary>Evidence — ${ev.length} passage${ev.length === 1 ? "" : "s"} the reader has read</summary>`;
    for (const e of ev) {
      html += '<div class="vsource">';
      html += `<div class="sid">${esc(e.chapter_label)} · ${esc(e.chunk_id)}</div>`;
      html += `<div class="stext">${esc(e.text)}</div>`;
      html += "</div>";
    }
    html += "</details>";
  }
  html += "</details></div>";
  return html;
}

async function ask(intention) {
  if (!selectedText) return;
  const answer = $("answer");
  document.querySelectorAll(".acts button").forEach((b) => (b.disabled = true));
  startSpinner();
  try {
    const res = await fetch("/respond", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        selected_text: selectedText,
        intention,
        reader_position: parseInt($("pos").value, 10),
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "request failed");
    stopSpinner();

    answer.innerHTML = '<span class="tag"></span><div class="md"></div><div class="vhost"></div>';
    answer.querySelector(".tag").textContent = intention;
    const md = answer.querySelector(".md");
    if (window.marked) md.innerHTML = marked.parse(data.answer);
    else md.textContent = data.answer;
    answer.querySelector(".vhost").innerHTML = renderValidation(data.validation);
  } catch (e) {
    stopSpinner();
    answer.innerHTML = '<span class="muted">Error: ' + esc(e.message) + "</span>";
  } finally {
    document.querySelectorAll(".acts button").forEach((b) => (b.disabled = !selectedText));
  }
}

// Only capture selections made inside the book text.
$("book").addEventListener("mouseup", () => {
  const s = window.getSelection().toString();
  if (s.trim()) setSelection(s);
});
$("pos").addEventListener("input", () => { $("posVal").textContent = $("pos").value; });
$("pos").addEventListener("change", () => { setSelection(""); loadBook(); });
document.querySelectorAll(".acts button").forEach((b) =>
  b.addEventListener("click", () => ask(b.dataset.intent))
);

(async () => { await loadConfig(); await loadBook(); })();
</script>
</body>
</html>
