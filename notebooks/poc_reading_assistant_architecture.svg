  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A vertical pipeline diagram showing how a reader's question flows through entity extraction, two parallel retrieval strategies (lexical and embedding), a position bound filter that drops chunks beyond the reader's current chapter, generation with a graduated response prompt, and finally an answer.</desc>
